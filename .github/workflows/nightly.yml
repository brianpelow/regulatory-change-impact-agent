name: Nightly Assessment
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  assess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Run assessment
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          uv sync
          uv run python scripts/agent.py
      - name: Commit assessments
        run: |
          git config user.name "rcia[bot]"
          git config user.email "agent@brianpelow.github.io"
          git add assessments/
          git diff --staged --quiet || git commit -m "chore(agent): impact assessments $(date -u +%Y-%m-%d)"
          git push
